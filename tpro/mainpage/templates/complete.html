<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>주문 완료 - H&R</title>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #fff;
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .complete-box {
            text-align: center;
            margin-top: 15vh;
            flex: 1;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
            color: #800020;
        }

        h2 {
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        p {
            color: #666;
            margin-bottom: 40px;
        }

        /* [포인트] 홈 버튼 딥 레드 */
        .home-btn {
            display: inline-block;
            padding: 18px 50px;
            background: #800020;
            color: #fff;
            text-decoration: none;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .home-btn:hover {
            background: #600018;
        }

        .site-footer {
            background-color: #fff;
            color: #000;
            padding: 80px 20px;
            border-top: 1px solid #eee;
            text-align: center;
            margin-top: 100px;
        }

        .logo-text {
            font-weight: 900;
            font-size: 30px;
            letter-spacing: -1.5px;
            color: #800020;
        }

        .footer-info p {
            font-size: 13px;
            color: #666;
            margin: 5px 0;
        }

        .footer-links {
            margin-top: 30px;
        }

        .footer-links a {
            color: #800020;
            text-decoration: none;
            font-size: 12px;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="complete-box">
        <div class="icon">✓</div>
        <h2>ORDER COMPLETE</h2>
        <p>주문이 성공적으로 완료되었습니다.<br>맛있는 음식을 곧 준비해 드릴게요!</p>
        <a href="/main" class="home-btn">메인으로 돌아가기</a>
    </div>

    <footer class="site-footer">
        <div class="footer-logo">
            <a href="/main" style="text-decoration: none;">
                <span class="logo-text">H<span class="amp">&</span>R</span>
            </a>
        </div>
        <div class="footer-info">
            <p>&copy; 2026 <strong>5TEAM Project</strong>. H&R HOLDINGS</p>
            <p>Hyundai Rotem & AI Defense Industry Bootcamp Project</p>
        </div>
    </footer>
</body>

</html>
