<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>주문/결제</title>
    <style>
        body {
            background: #fff !important;
            color: #000 !important;
        }

        .order-box,
        .complete-box {
            background: #fff !important;
            border: 1px solid #eee !important;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        .pay-btn,
        .home-btn {
            background: #800020 !important;
            color: #fff !important;
            border-radius: 4px !important;
        }

        h2,
        p {
            color: #000 !important;
        }

        /* 푸터 스타일 동일 */
    </style>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background: #fff !important;
            /* 배경은 화이트 */
            color: #000 !important;

            /* [수정] 요소들을 세로로 배치하도록 변경 */
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 가로 중앙 정렬 */
            min-height: 100vh;
            /* 화면 높이를 최소 100%로 유지 */
            margin: 0;
        }

        .order-box {
            background: #fff !important;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #eee !important;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);

            /* [추가] 결제창과 푸터 사이의 간격 확보 */
            margin-top: 10vh;
            margin-bottom: 50px;
        }

        h2 {
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .info-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
            color: #ccc;
        }

        hr {
            border: 0;
            border-top: 1px solid #333;
            margin: 25px 0;
        }

        .pay-btn {
            width: 100%;
            padding: 18px;
            background: #fff;
            /* 버튼은 반대로 흰색 */
            color: #000;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }

        .pay-btn:hover {
            background: #ddd;
        }

        .site-footer {
            width: 100%;
            /* 푸터가 화면 가로를 꽉 채우도록 */
            background-color: #fff;
            color: #000;
            padding: 60px 20px;
            border-top: 1px solid #eee;
            text-align: center;
            margin-top: auto;
            /* 푸터를 항상 맨 아래로 밀어냄 */
        }

        .logo-text {
            font-weight: 900;
            font-size: 30px;
            letter-spacing: -1.5px;
            color: #800020;
        }

        .footer-info p {
            font-size: 13px;
            color: #666;
            margin: 5px 0;
        }

        .footer-links {
            margin-top: 30px;
        }

        .footer-links a {
            color: #800020;
            text-decoration: none;
            font-size: 12px;
            margin: 0 15px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="order-box">
        <h2>ORDER / PAYMENT</h2>
        <div class="info-line"><span>배송지</span><strong>서울시 강남구</strong></div>
        <div class="info-line"><span>결제수단</span><strong>신용카드 / 페이</strong></div>
        <hr>
        <p style="color: #888; font-size: 13px; margin-bottom: 20px;">최종 결제 금액을 확인하셨나요?</p>
        <button onclick="location.href='/order_complete'" class="pay-btn">결제하기</button>
    </div>
    <footer class="site-footer">
        <div class="footer-logo">
            <a href="/main" style="text-decoration: none;">
                <span class="logo-text">H<span class="amp">&</span>R</span>
            </a>
        </div>
        <div class="footer-info">
            <p>&copy; 2026 <strong>5TEAM Project</strong>. H&R HOLDINGS</p>
            <p>Hyundai Rotem & AI Defense Industry Bootcamp Project</p>
        </div>
    </footer>
</body>

</html>
