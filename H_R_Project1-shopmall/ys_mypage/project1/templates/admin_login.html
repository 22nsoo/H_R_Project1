<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - H&R</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: #fff;
            color: #111;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .topbar {
            width: 100%;
            height: 48px;
            background: #800020;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 84px;
            font-size: 14px;
            font-weight: bold;
        }

        .topbar-left,
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 26px;
        }

        .wrap {
            max-width: 400px;
            margin: 0 auto;
            padding: 80px 20px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            font-size: 52px;
            font-weight: 900;
            color: #800020;
            letter-spacing: -2px;
            margin-bottom: 16px;
            text-align: center;
        }

        .admin-title {
            font-size: 16px;
            font-weight: 700;
            color: #333;
            margin-bottom: 28px;
        }

        .flash {
            width: 100%;
            border: 1px solid #ead6dc;
            background: #faf7f8;
            color: #800020;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 14px;
            border-radius: 8px;
            text-align: center;
        }

        form {
            width: 100%;
        }

        .input {
            width: 100%;
            height: 54px;
            padding: 0 15px;
            border: 1px solid #f2f2f2;
            border-radius: 8px;
            background: #f9f9f9;
            font-size: 15px;
            margin-bottom: 10px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input:focus {
            border-color: #800020;
            background: #fff;
        }

        .btn-login {
            width: 100%;
            height: 54px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            margin-top: 5px;
            transition: opacity 0.3s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .sub-links {
            margin-top: 25px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 13px;
            color: #888;
        }

        .sub-links a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 0 24px;
            }

            .wrap {
                padding-top: 50px;
            }
        }
    </style>
</head>

<body>

    <div class="topbar">
        <div class="topbar-left">
            <a href="/main">H&R</a>
            <a href="#">ADMIN</a>
        </div>
        <div class="topbar-right">
            <a href="/main">쇼핑몰로 돌아가기</a>
        </div>
    </div>

    <div class="wrap">
        <a href="/main" class="logo">H&amp;R</a>
        <div class="admin-title">관리자 로그인</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <input type="text" name="admin_id" class="input" placeholder="관리자 아이디" required>
            <input type="password" name="admin_pw" class="input" placeholder="비밀번호" required>
            <button type="submit" class="btn-login">관리자 로그인</button>
        </form>

        <div class="sub-links">
            <a href="/main">메인으로</a>
        </div>
    </div>

</body>
</html>
