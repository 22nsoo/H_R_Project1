<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - H&R</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">
</head>

<body>

    <div class="topbar">
        <div class="topbar-left">
            <a href="/main">H&R</a>
            <a href="#">ADMIN</a>
        </div>
        <div class="topbar-right">
            <a href="/main">쇼핑몰로 돌아가기</a>
        </div>
    </div>

    <div class="wrap">
        <a href="/main" class="logo">H&amp;R</a>
        <div class="admin-title">관리자 로그인</div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin_login') }}" method="POST">
            <input type="text" name="admin_id" class="input" placeholder="관리자 아이디" required>
            <input type="password" name="admin_pw" class="input" placeholder="비밀번호" required>
            <button type="submit" class="btn-login">관리자 로그인</button>
        </form>

        <div class="sub-links">
            <a href="/main">메인으로</a>
        </div>
    </div>

</body>
</html>
