<div class="container"
    style="max-width: 850px; margin: 60px auto; padding: 0 20px; font-family: 'Pretendard', sans-serif;">
    <div style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
            <span
                style="color: #800000; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Customer
                Service</span>
            <h2 style="margin: 5px 0 0 0; font-size: 28px; font-weight: 800; color: #111;">문의 상세확인</h2>
        </div>
        <span style="color: #999; font-size: 14px;">작성일: {{ cs.created_at.strftime('%Y-%m-%d %H:%M') if cs.created_at
            else '' }}</span>
    </div>

    <div
        style="background: #fff; border: 1px solid #eee; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.03);">

        <div style="padding: 40px; border-bottom: 1px solid #f5f5f5;">
            <div style="display: flex; align-items: flex-start; gap: 15px; margin-bottom: 20px;">
                <span
                    style="background: #fdf2f2; color: #800000; padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 700; border: 1px solid #ffdada;">
                    {{ cs.cs_type }}
                </span>
                <h3 style="margin: 0; font-size: 22px; color: #111; line-height: 1.3;">{{ cs.cs_title }}</h3>
            </div>

            <div style="line-height: 1.8; color: #555; font-size: 16px; white-space: pre-wrap; min-height: 100px;">
                {{ cs.cs_content }}
            </div>
        </div>

        <div style="padding: 40px; background: #fafafa;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
                <div
                    style="width: 32px; height: 32px; background: #111; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 14px;">
                    A</div>
                <strong style="color: #111; font-size: 16px;">H&R Official 답변</strong>
            </div>

            {% if cs.cs_reply %}
            <div
                style="padding: 25px; background: #fff; border: 1px solid #eee; border-radius: 8px; color: #444; line-height: 1.7; font-size: 15px; position: relative;">
                {{ cs.cs_reply }}
                <div style="margin-top: 15px; font-size: 13px; color: #bbb; text-align: right;">답변완료</div>
            </div>
            {% else %}
            <div style="padding: 30px; border: 1px dashed #ccc; border-radius: 8px; text-align: center;">
                <p style="margin: 0; color: #aaa; font-size: 15px;">
                    문의가 접수되었습니다. <br>
                    담당자가 확인 후 영업일 기준 1~2일 내에 답변을 드릴 예정입니다.
                </p>
            </div>
            {% endif %}
        </div>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 10px;">
        <button onclick="location.href='/cs/list'"
            style="flex: 1; padding: 18px; border: 1px solid #ddd; background: #fff; color: #333; font-weight: 700; cursor: pointer; border-radius: 8px; font-size: 15px; transition: 0.2s;"
            onmouseover="this.style.background='#f9f9f9'" onmouseout="this.style.background='#fff'">
            목록으로 돌아가기
        </button>
    </div>
</div>
