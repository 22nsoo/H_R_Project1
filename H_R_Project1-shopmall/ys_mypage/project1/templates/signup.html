<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - H&R</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/signup.css') }}">
</head>

<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/main">H&R</a>
            <a href="#">BEST</a>
            <a href="#">SALE</a>
        </div>
        <div class="topbar-right">
            <a href="/login">로그인</a>
        </div>
    </div>

    <div class="wrap">
        <div class="logo-area">
            <a href="/main" class="logo-text">H&R</a>
        </div>

        <h2>회원가입</h2>

        <form action="/signup" method="POST">
            <input type="text" name="user_id" class="input" placeholder="아이디" required>
            <input type="password" name="user_pw" class="input" placeholder="비밀번호" required>
            <input type="text" name="user_name" class="input" placeholder="이름" required>

            <div class="gender-box">
                <span class="gender-label">성별</span>
                <div class="gender-options">
                    <label><input type="radio" name="gender" value="남" checked style="accent-color: #800020;"> 남</label>
                    <label><input type="radio" name="gender" value="여" style="accent-color: #800020;"> 여</label>
                </div>
            </div>

            <div class="row">
                <input type="number" name="height" class="input" placeholder="키(cm)" required>
                <input type="number" name="weight" class="input" placeholder="몸무게(kg)" required>
            </div>

            <div class="field-label">평소 사이즈</div>
            <select name="size" class="select">
                <option value="XS">XS</option>
                <option value="S">S</option>
                <option value="M" selected>M</option>
                <option value="L">L</option>
                <option value="XL">XL</option>
                <option value="XXL">XXL</option>
            </select>

            <div class="field-label">선호하는 핏</div>
            <select name="preferred_fit" class="select">
                <option value="정핏">정핏</option>
                <option value="세미오버핏" selected>세미오버핏</option>
                <option value="오버핏">오버핏</option>
                <option value="슬림핏">슬림핏</option>
            </select>

            <button type="submit" class="btn-signup">가입하기</button>
        </form>

        <div class="bottom-link">
            이미 회원이신가요? <a href="/login">로그인</a>
        </div>
    </div>
</body>

</html>
