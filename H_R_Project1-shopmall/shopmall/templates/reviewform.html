<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>리뷰 작성</title>
    <style>
        body {
            margin: 0;
            font-family: 'Pretendard', sans-serif;
            background: #f7f7f7;
            color: #222;
        }

        .wrap {
            max-width: 760px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .card {
            background: #fff;
            border-radius: 18px;
            padding: 36px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 30px;
        }

        .sub {
            color: #777;
            margin-bottom: 30px;
        }

        .product-box {
            padding: 18px 20px;
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 12px;
            margin-bottom: 28px;
        }

        .product-name {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .product-meta {
            color: #666;
            font-size: 14px;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 8px;
            margin-top: 18px;
        }

        select,
        textarea,
        button {
            box-sizing: border-box;
            font-family: inherit;
        }

        select,
        textarea {
            width: 100%;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            background: #fff;
        }

        textarea {
            resize: vertical;
            min-height: 130px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 26px;
        }

        .btn {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            padding: 0 22px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid #000;
        }

        .btn-black {
            background: #000;
            color: #fff;
        }

        .btn-white {
            background: #fff;
            color: #000;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h1>리뷰 작성</h1>
            <div class="sub">구매 경험을 남겨주면 비슷한 체형 사용자에게 더 정확한 추천이 제공돼요.</div>

            <div class="product-box">
                <div class="product-name">{{ product.product_name }}</div>
                <div class="product-meta">
                    {{ product.brand }} · {{ "{:,}".format(product.price) }}원
                    {% if product.size_options %}
                    · 사이즈 옵션: {{ product.size_options }}
                    {% endif %}
                </div>
            </div>

            <form method="post">
                <label for="purchased_size">구매한 사이즈</label>
                <select name="purchased_size" id="purchased_size" required>
                    {% for s in product.size_options.split(',') %}
                    <option value="{{ s.strip() }}">{{ s.strip() }}</option>
                    {% endfor %}
                </select>

                <label for="size_feel">사이즈 체감</label>
                <select name="size_feel" id="size_feel" required>
                    <option value="작음">작음</option>
                    <option value="정사이즈" selected>정사이즈</option>
                    <option value="큼">큼</option>
                </select>

                <label for="fit_feel">핏 체감</label>
                <select name="fit_feel" id="fit_feel" required>
                    <option value="슬림핏">슬림핏</option>
                    <option value="정핏">정핏</option>
                    <option value="세미오버핏" selected>세미오버핏</option>
                    <option value="오버핏">오버핏</option>
                </select>

                <label for="rating">만족도</label>
                <select name="rating" id="rating" required>
                    <option value="5">5점</option>
                    <option value="4">4점</option>
                    <option value="3">3점</option>
                    <option value="2">2점</option>
                    <option value="1">1점</option>
                </select>

                <label for="review_text">리뷰 내용</label>
                <textarea name="review_text" id="review_text" rows="6"
                    placeholder="예: 정사이즈 느낌이고 어깨가 편해요. 세미오버핏으로 입기 좋았고 전반적으로 만족합니다."
                    required></textarea>

                <div class="btn-row">
                    <button type="submit" class="btn btn-black">리뷰 등록</button>
                    <a href="{{ url_for('product_detail', p_id=product.product_id) }}" class="btn btn-white">돌아가기</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
