<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보 수정 - H&R</title>
    <style>
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: #fff;
            color: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .topbar {
            width: 100%;
            height: 48px;
            background: #800020;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 84px;
            font-size: 14px;
            font-weight: bold;
            box-sizing: border-box;
        }

        .topbar a {
            color: #fff;
            text-decoration: none;
        }

        .topbar-left,
        .topbar-right {
            display: flex;
            gap: 26px;
        }

        .wrap {
            width: 100%;
            max-width: 400px;
            padding: 50px 20px 80px;
            box-sizing: border-box;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-text {
            font-size: 48px;
            font-weight: 900;
            color: #800020;
            letter-spacing: -2px;
            text-decoration: none;
        }

        h2 {
            text-align: center;
            margin: 0 0 30px 0;
            font-size: 24px;
            font-weight: 900;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input,
        .select,
        .gender-box {
            width: 100%;
            height: 52px;
            padding: 0 15px;
            border: 1px solid #f2f2f2;
            border-radius: 8px;
            box-sizing: border-box;
            background: #f9f9f9;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input:focus,
        .select:focus {
            border-color: #800020;
            background: #fff;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row .input {
            width: calc(50% - 5px);
        }

        .gender-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .gender-label {
            font-size: 14px;
            color: #666;
        }

        .gender-options {
            display: flex;
            gap: 20px;
        }

        .gender-options label {
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .field-label {
            font-size: 13px;
            color: #800020;
            font-weight: bold;
            margin-bottom: -8px;
            margin-left: 5px;
        }

        .btn-signup {
            width: 100%;
            height: 56px;
            background: #800020;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 17px;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .btn-signup:hover {
            opacity: 0.9;
        }

        .bottom-link {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .bottom-link a {
            text-decoration: none;
            color: #800020;
            font-weight: bold;
            margin-left: 5px;
        }

        .flash-msg {
            width: 100%;
            border: 1px solid #ead6dc;
            background: #faf7f8;
            color: #800020;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 14px;
            border-radius: 8px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 0 20px;
            }
        }
    </style>
</head>

<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/main">H&R</a>
            <a href="#">BEST</a>
            <a href="#">SALE</a>
        </div>
        <div class="topbar-right">
            <a href="/mypage">마이페이지</a>
        </div>
    </div>

    <div class="wrap">
        <div class="logo-area">
            <a href="/main" class="logo-text">H&R</a>
        </div>

        <h2>정보 수정</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for message in messages %}
        <div class="flash-msg">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="/edit_profile" method="POST">
            <div class="gender-box">
                <span class="gender-label">성별</span>
                <div class="gender-options">
                    <label>
                        <input type="radio" name="gender" value="남"
                            {{ 'checked' if user.gender == '남' else '' }}
                            style="accent-color: #800020;"> 남
                    </label>
                    <label>
                        <input type="radio" name="gender" value="여"
                            {{ 'checked' if user.gender == '여' else '' }}
                            style="accent-color: #800020;"> 여
                    </label>
                </div>
            </div>

            <div class="row">
                <input type="number" name="height" class="input"
                       placeholder="키(cm)" value="{{ user.height }}" required>
                <input type="number" name="weight" class="input"
                       placeholder="몸무게(kg)" value="{{ user.weight }}" required>
            </div>

            <div class="field-label">평소 사이즈</div>
            <select name="size" class="select">
                {% for s in ['XS', 'S', 'M', 'L', 'XL', 'XXL'] %}
                <option value="{{ s }}" {{ 'selected' if user.usual_size == s else '' }}>{{ s }}</option>
                {% endfor %}
            </select>

            <div class="field-label">선호하는 핏</div>
            <select name="preferred_fit" class="select">
                {% for f in ['정핏', '세미오버핏', '오버핏', '슬림핏'] %}
                <option value="{{ f }}" {{ 'selected' if user.preferred_fit == f else '' }}>{{ f }}</option>
                {% endfor %}
            </select>

            <button type="submit" class="btn-signup">수정하기</button>
        </form>

        <div class="bottom-link">
            <a href="/mypage">마이페이지로 돌아가기</a>
        </div>
    </div>
</body>

</html>
