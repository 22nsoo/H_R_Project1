<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인</title>

<link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">

<style>

.login-page{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#f5f3ff 0%,#ece8f8 100%);
padding:24px;
}

.login-wrap{
width:100%;
max-width:980px;
display:grid;
grid-template-columns:1.1fr 0.9fr;
background:#fff;
border:1px solid #e5e7eb;
border-radius:24px;
overflow:hidden;
box-shadow:0 20px 50px rgba(15,23,42,0.10);
}

.login-visual{
background:linear-gradient(135deg,#1a233a 0%,#2f6bff 100%);
color:#fff;
padding:56px 44px;
display:flex;
flex-direction:column;
justify-content:center;
}

.login-visual h1{
margin:0 0 14px;
font-size:34px;
font-weight:800;
}

.login-visual p{
margin:0;
font-size:15px;
line-height:1.7;
color:rgba(255,255,255,0.9);
}

.login-panel{
padding:48px 40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.login-title h2{
margin:0 0 8px;
font-size:28px;
}

.login-title p{
margin:0 0 28px;
font-size:14px;
color:#6b7280;
}

.login-form label{
display:block;
margin-bottom:6px;
font-size:14px;
font-weight:700;
}

.login-form input{
width:100%;
height:48px;
padding:0 14px;
border:1px solid #d9e2ec;
border-radius:12px;
font-size:14px;
margin-bottom:16px;
}

.login-btn{
width:100%;
height:50px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#2f6bff 0%,#1e56d8 100%);
color:#fff;
font-size:15px;
font-weight:700;
cursor:pointer;
}

.login-alert{
margin-bottom:16px;
background:#fff5f5;
border:1px solid #fed7d7;
color:#c53030;
padding:12px;
border-radius:10px;
font-size:14px;
}

</style>
</head>

<body class="login-page">

<div class="login-wrap">

<section class="login-visual">

<h1>쇼핑몰 계정 로그인</h1>

<p>
로그인 화면 앞단의 메인페이지에 연결하면됨
</p>

</section>


<section class="login-panel">

<div class="login-title">
<h2>로그인</h2>
<p>아이디와 비밀번호를 입력해주세요.</p>
</div>


{% with messages = get_flashed_messages() %}
{% if messages %}
{% for message in messages %}
<div class="login-alert">{{ message }}</div>
{% endfor %}
{% endif %}
{% endwith %}


<form method="post" class="login-form">

<label>아이디</label>
<input type="text" name="login_id" required>

<label>비밀번호</label>
<input type="password" name="password" required>

<button type="submit" class="login-btn">로그인</button>

</form>

</section>

</div>

</body>
</html>
