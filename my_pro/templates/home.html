<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매자 홈</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body class="home-page">
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-title">판매자 메뉴</div>
            <ul class="menu">
                <li class="active"><a href="{{ url_for('home') }}">홈</a></li>
            </ul>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1>판매자 선택</h1>
            </header>

            <div class="panel">
                <h2>판매자 목록</h2>

                {% if sellers %}
                    <div class="rank-list">
                        {% for seller in sellers %}
                            <div class="rank-item seller-home-item">
                                <div class="rank-num">{{ seller["seller_id"] }}</div>
                                <div class="rank-text">
                                    <div class="product-name">{{ seller["seller_name"] }}</div>
                                </div>
                                <div class="home-actions">
                                    <a class="action-btn" href="{{ url_for('seller_dashboard', seller_id=seller['seller_id']) }}">대시보드</a>
                                    <a class="action-btn secondary" href="{{ url_for('seller_products', seller_id=seller['seller_id']) }}">상품관리</a>
                                    <a class="action-btn secondary" href="{{ url_for('seller_orders', seller_id=seller['seller_id']) }}">주문관리</a>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                {% else %}
                    <p>등록된 판매자가 없습니다.</p>
                {% endif %}
            </div>
        </main>
    </div>
</body>
</html>
