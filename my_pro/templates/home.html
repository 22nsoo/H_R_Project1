<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매자 홈</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">
</head>
<body class="home-page">
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-title">판매자 메뉴</div>
            <ul class="menu">
                <li class="active"><a href="{{ url_for('home') }}">홈</a></li>
            </ul>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1>판매자 선택</h1>
            </header>

            <div class="panel">
                <h2>판매자 목록</h2>

                {% if sellers %}
                    <div class="rank-list">
                        {% for seller in sellers %}
                            <div class="rank-item seller-home-item">
                                <div class="rank-num">{{ seller["seller_id"] }}</div>
                                <div class="rank-text">
                                    <div class="product-name">{{ seller["seller_name"] }}</div>
                                </div>
                                <div class="home-actions">
                                    <li><a href="{{ url_for('seller_dashboard') }}">대시보드</a></li>
                                    <li><a href="{{ url_for('seller_sales') }}">매출 관리</a></li>
                                    <li><a href="{{ url_for('seller_products') }}">상품 관리</a></li>
                                    <li><a href="{{ url_for('seller_orders') }}">주문 관리</a></li>
                                    <li><a href="{{ url_for('seller_cs') }}">문의 및 교환/환불</a></li>
                                    <li><a href="{{ url_for('logout') }}">로그아웃</a></li>
                                </div>
                            </div>
                        {% endfor %}
                    </div>
                {% else %}
                    <p>등록된 판매자가 없습니다.</p>
                {% endif %}
            </div>
        </main>
    </div>
</body>
</html>
