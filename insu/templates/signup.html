<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - H&R</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff;
            color: #111;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .topbar {
            width: 100%;
            height: 48px;
            background: #800020;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 84px;
            font-size: 14px;
            font-weight: bold;
        }

        .topbar-left,
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 26px;
        }

        .wrap {
            max-width: 620px;
            margin: 0 auto;
            padding: 48px 24px 80px;
        }

        .logo {
            text-align: center;
            font-size: 58px;
            font-weight: 900;
            color: #800020;
            letter-spacing: -2px;
            margin-bottom: 18px;
        }

        .title {
            text-align: center;
            font-size: 34px;
            font-weight: 900;
            margin-bottom: 34px;
        }

        .form-box {
            border: 1px solid #e8e8e8;
            background: #fff;
            padding: 34px;
        }

        .input,
        .select {
            width: 100%;
            height: 56px;
            border: 1px solid #d8c8ce;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            background: #fff;
            margin-bottom: 14px;
        }

        .input:focus,
        .select:focus {
            border-color: #800020;
        }

        .row {
            display: flex;
            gap: 14px;
        }

        .row .input {
            margin-bottom: 14px;
        }

        .gender-box {
            width: 100%;
            height: 56px;
            border: 1px solid #d8c8ce;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            margin-bottom: 14px;
            font-size: 15px;
            background: #fff;
        }

        .gender-options {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .gender-options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .label {
            font-size: 14px;
            color: #666;
            font-weight: bold;
            margin: 4px 0 8px;
        }

        .btn {
            width: 100%;
            height: 60px;
            border: none;
            background: #800020;
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 8px;
        }

        .bottom-text {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .bottom-text a {
            color: #800020;
            font-weight: bold;
            margin-left: 6px;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 0 24px;
            }

            .row {
                flex-direction: column;
                gap: 0;
            }

            .logo {
                font-size: 42px;
            }

            .title {
                font-size: 28px;
            }

            .form-box {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/main">H&R</a>
            <a href="#">BEST</a>
            <a href="#">SALE</a>
        </div>
        <div class="topbar-right">
            <a href="/login">로그인</a>
        </div>
    </div>

    <div class="wrap">
        <div class="logo">H&amp;R</div>
        <div class="title">회원가입</div>

        <div class="form-box">
            <form action="/signup" method="POST">
                <input type="text" name="user_id" class="input" placeholder="아이디" required>
                <input type="password" name="user_pw" class="input" placeholder="비밀번호" required>
                <input type="text" name="user_name" class="input" placeholder="이름" required>

                <div class="gender-box">
                    <span>성별</span>
                    <div class="gender-options">
                        <label><input type="radio" name="gender" value="남" checked> 남</label>
                        <label><input type="radio" name="gender" value="여"> 여</label>
                    </div>
                </div>

                <div class="row">
                    <input type="number" name="height" class="input" placeholder="키(cm)" required>
                    <input type="number" name="weight" class="input" placeholder="몸무게(kg)" required>
                </div>

                <div class="label">평소 사이즈</div>
                <select name="size" class="select">
                    <option value="XS">XS</option>
                    <option value="S">S</option>
                    <option value="M" selected>M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="XXL">XXL</option>
                </select>

                <div class="label">선호 핏</div>
                <select name="preferred_fit" class="select">
                    <option value="정핏">정핏</option>
                    <option value="세미오버핏" selected>세미오버핏</option>
                    <option value="오버핏">오버핏</option>
                    <option value="슬림핏">슬림핏</option>
                </select>

                <button type="submit" class="btn">가입하기</button>
            </form>

            <div class="bottom-text">
                이미 회원이신가요?
                <a href="/login">로그인</a>
            </div>
        </div>
    </div>
</body>
</html>
