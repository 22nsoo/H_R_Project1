{% extends 'base.html' %}
{% block title %}내 체형 정보{% endblock %}
{% block content %}
<h1>내 체형 정보</h1>
<div class="card">
    <form method="post">
        <label>성별</label>
        <select name="gender">
            <option value="male" {% if user.gender == 'male' %}selected{% endif %}>male</option>
            <option value="female" {% if user.gender == 'female' %}selected{% endif %}>female</option>
        </select>

        <label>키(cm)</label>
        <input type="number" name="height" value="{{ user.height or '' }}" required>

        <label>몸무게(kg)</label>
        <input type="number" name="weight" value="{{ user.weight or '' }}" required>

        <label>선호 핏</label>
        <select name="preferred_fit">
            {% for fit in ['슬림핏', '정핏', '세미오버핏', '오버핏'] %}
            <option value="{{ fit }}" {% if user.preferred_fit == fit %}selected{% endif %}>{{ fit }}</option>
            {% endfor %}
        </select>

        <label>평소 입는 사이즈</label>
        <select name="usual_size">
            {% for s in ['S', 'M', 'L', 'XL'] %}
            <option value="{{ s }}" {% if user.usual_size == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>

        <button type="submit">저장</button>
    </form>
</div>
{% endblock %}
