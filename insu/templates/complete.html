<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>주문 완료 - H&R</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff;
            color: #111;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .topbar {
            width: 100%;
            height: 48px;
            background: #800020;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 84px;
            font-size: 14px;
            font-weight: bold;
        }

        .topbar-left,
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 26px;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 24px 100px;
            text-align: center;
        }

        .logo {
            font-size: 58px;
            font-weight: 900;
            color: #800020;
            letter-spacing: -2px;
            margin-bottom: 30px;
        }

        .complete-box {
            border: 1px solid #ead6dc;
            background: #faf7f8;
            padding: 70px 30px;
        }

        .icon {
            font-size: 52px;
            margin-bottom: 20px;
            color: #800020;
        }

        .title {
            font-size: 34px;
            font-weight: 900;
            margin-bottom: 14px;
        }

        .desc {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 34px;
        }

        .btn-row {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn {
            min-width: 180px;
            height: 56px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
        }

        .btn-primary {
            background: #800020;
            color: #fff;
            border: 1px solid #800020;
        }

        .btn-outline {
            background: #fff;
            color: #800020;
            border: 1px solid #800020;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 0 24px;
            }

            .logo {
                font-size: 42px;
            }

            .title {
                font-size: 28px;
            }

            .complete-box {
                padding: 50px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/main">H&R</a>
            <a href="#">BEST</a>
            <a href="#">SALE</a>
        </div>
        <div class="topbar-right">
            <a href="/main">홈</a>
        </div>
    </div>

    <div class="wrap">
        <div class="logo">H&amp;R</div>

        <div class="complete-box">
            <div class="icon">✔</div>
            <div class="title">주문이 완료되었습니다</div>
            <div class="desc">
                H&amp;R을 이용해주셔서 감사합니다.<br>
                주문 내역이 정상적으로 접수되었습니다.
            </div>

            <div class="btn-row">
                <a href="/main" class="btn btn-primary">메인으로 가기</a>
                <a href="/cart" class="btn btn-outline">장바구니 확인</a>
            </div>
        </div>
    </div>
</body>
</html>
