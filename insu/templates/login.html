<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로그인 - H&R</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #fff;
            color: #111;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .topbar {
            width: 100%;
            height: 48px;
            background: #800020;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 84px;
            font-size: 14px;
            font-weight: bold;
        }

        .topbar-left,
        .topbar-right {
            display: flex;
            align-items: center;
            gap: 26px;
        }

        .wrap {
            max-width: 560px;
            margin: 0 auto;
            padding: 56px 24px 90px;
        }

        .logo {
            text-align: center;
            font-size: 58px;
            font-weight: 900;
            color: #800020;
            letter-spacing: -2px;
            margin-bottom: 18px;
        }

        .title {
            text-align: center;
            font-size: 34px;
            font-weight: 900;
            margin-bottom: 34px;
        }

        .form-box {
            border: 1px solid #e8e8e8;
            background: #fff;
            padding: 34px;
        }

        .input {
            width: 100%;
            height: 58px;
            border: 1px solid #d8c8ce;
            padding: 0 16px;
            font-size: 15px;
            outline: none;
            background: #fff;
            margin-bottom: 14px;
        }

        .input:focus {
            border-color: #800020;
        }

        .btn {
            width: 100%;
            height: 60px;
            border: none;
            background: #800020;
            color: #fff;
            font-size: 17px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 8px;
        }

        .sub-links {
            margin-top: 18px;
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .sub-links a {
            color: #800020;
            font-weight: bold;
            margin-left: 6px;
        }

        .flash {
            border: 1px solid #ead6dc;
            background: #faf7f8;
            color: #800020;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .topbar {
                padding: 0 24px;
            }

            .logo {
                font-size: 42px;
            }

            .title {
                font-size: 28px;
            }

            .form-box {
                padding: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-left">
            <a href="/main">H&R</a>
            <a href="#">BEST</a>
            <a href="#">SALE</a>
        </div>
        <div class="topbar-right">
            <a href="/signup">회원가입</a>
        </div>
    </div>

    <div class="wrap">
        <div class="logo">H&amp;R</div>
        <div class="title">로그인</div>

        <div class="form-box">
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="flash">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <input type="text" name="user_id" class="input" placeholder="아이디" required>
                <input type="password" name="user_pw" class="input" placeholder="비밀번호" required>
                <button type="submit" class="btn">로그인</button>
            </form>

            <div class="sub-links">
                아직 회원이 아니신가요?
                <a href="/signup">회원가입</a>
            </div>
        </div>
    </div>
</body>
</html>
